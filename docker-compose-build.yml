name: formulaonebot

x-app-common: &app-common
  image: formulaonebot-app:${APP_VERSION:-latest}
  build:
    context: .
    dockerfile: Dockerfile
    args:
      APP_VERSION: ${APP_VERSION:-latest}
      VITE_API_URL: ""
  env_file:
    - .env
  environment:
    APP_ENV: production
    AUTH_COOKIE_SECURE: "true"
    DATABASE_PATH: /app/data/bot.db
    PUBLIC_WEB_URL: ${PUBLIC_WEB_URL:-https://f1hub.ru}
    WEB_ORIGINS: ${WEB_ORIGINS:-https://f1hub.ru,https://www.f1hub.ru}
    REDIS_URL: redis://redis:6379/0
    PYTHONUNBUFFERED: "1"
  volumes:
    - ./data:/app/data
    - ./logs:/app/logs
    - ./fastf1_cache:/app/fastf1_cache
  restart: unless-stopped
  init: true
  stop_grace_period: 30s
  security_opt:
    - no-new-privileges:true
  logging:
    driver: json-file
    options:
      max-size: 10m
      max-file: "3"

services:
  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  bot:
    <<: *app-common
    command: ["python", "-m", "app.main"]
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import os; os.kill(1, 0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  web:
    <<: *app-common
    command:
      - uvicorn
      - app.api.miniapp_api:web_app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --workers
      - "1"
      - --proxy-headers
      - --forwarded-allow-ips=*
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"
      interval: 15s
      timeout: 7s
      retries: 5
      start_period: 45s

  nginx:
    image: nginx:1.28-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ${SSL_DIR:-./ssl}:/etc/nginx/ssl:ro
    depends_on:
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "--quiet", "--spider", "https://127.0.0.1/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

volumes:
  redis_data:
